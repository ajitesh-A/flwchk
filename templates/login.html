<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

<title>FLWCHK | Setup</title>

                    "surface-variant": "#333535",
                    "on-background": "#e2e2e2",
                    "on-tertiary-container": "#dad8d7",
                    "tertiary-fixed": "#e5e2e1",
                    "secondary": "#c6c6c6",
                    "primary": "#e3b5ff",
                    "surface-container-highest": "#333535",
                    "outline-variant": "rgba(255, 255, 255, 0.1)",
                    "on-primary-fixed": "#2f004c",
                    "inverse-surface": "#e2e2e2",
                    "on-secondary-container": "#b5b5b5",
                    "surface-container": "rgba(30, 32, 32, 0.6)",
                    "on-primary-container": "#eeccff",
                    "on-error": "#690005",
                    "tertiary": "#c8c6c5",

                    "on-surface": "#e2e2e2",

                    "on-tertiary-fixed": "#1c1b1b",
                    "secondary-container": "#474747",
                    "surface-container-low": "rgba(26, 28, 28, 0.4)",
                    "surface-dim": "#121414",
                    "on-surface-variant": "#d0c2d3",
                    "on-primary-fixed-variant": "#6a1c9b",
                    "on-tertiary-fixed-variant": "#474746",
                    "surface-container-high": "#282a2b",
                    "surface-container-lowest": "#0c0f0f",
                    "inverse-primary": "#833ab4",
                    "on-secondary": "#303030",
                    "on-tertiary": "#313030",
                    "secondary-fixed-dim": "#c6c6c6",
                    "on-primary": "#4e0079",
                    "primary-container": "#833ab4",
                    "surface-bright": "#38393a",

            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",

            "spacing": {
                    "container-max": "1440px",

            },
            "fontFamily": {

          },
        },
      }
    </script>
<style>
        body {
            background-color: #0c0f0f;
            color: #e2e2e2;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .input-focus-ring:focus {
            outline: none;
            border-color: #e3b5ff;
            box-shadow: 0 0 0 2px rgba(227, 181, 255, 0.2);
        }
        .purple-gradient-bg {
            background: linear-gradient(135deg, #833ab4 0%, #121414 100%);
        }
        .text-gradient {
            background: linear-gradient(135deg, #e3b5ff 0%, #833ab4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass-card {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(30, 32, 32, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .mesh-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(at 0% 0%, rgba(131, 58, 180, 0.15) 0px, transparent 50%),
                        radial-gradient(at 100% 100%, rgba(0, 100, 80, 0.1) 0px, transparent 50%),
                        radial-gradient(at 50% 50%, rgba(131, 58, 180, 0.05) 0px, transparent 50%);
            background-color: #0c0f0f;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-base">
<div class="mesh-gradient"></div>
<div class="fixed inset-0 pointer-events-none opacity-40 overflow-hidden">
<div class="absolute -top-1/4 -left-1/4 w-full h-full bg-primary-container rounded-full blur-[180px] opacity-20"></div>
<div class="absolute -bottom-1/4 -right-1/4 w-full h-full bg-[#121414] rounded-full blur-[180px]"></div>
</div>
<main class="relative z-10 w-full max-w-[500px] flex flex-col gap-gutter animate-in fade-in slide-in-from-bottom-4 duration-1000">
<header class="text-center space-y-base mb-base flex flex-col items-center">
<img alt="FLWCHK Logo" class="w-20 h-20 mb-base drop-shadow-[0_0_15px_rgba(227,181,255,0.3)]" src="/static/img/logo.svg"/>
<h1 class="font-display-lg text-[64px] leading-tight uppercase font-black tracking-tighter text-gradient mb-2" style="font-weight: 900; letter-spacing: -0.04em;">FLWCHK</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[340px] opacity-80">
                Next-generation analytics for high-performance profile management.
            </p>
</header>
<section class="glass-card rounded-xl p-gutter shadow-2xl">
<form class="flex flex-col gap-gutter" id="login-form">
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface-variant px-1 uppercase tracking-widest opacity-60" for="username">Instagram Username</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-gutter top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">person</span>
<input class="w-full h-12 pl-11 pr-gutter bg-surface-container-lowest/50 border border-white/5 rounded-lg text-on-surface font-body-md input-focus-ring transition-all" id="username" placeholder="Enter your username" type="text"/>
</div>
</div>
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface-variant px-1 uppercase tracking-widest opacity-60" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-gutter top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">lock</span>
<input class="w-full h-12 pl-11 pr-gutter bg-surface-container-lowest/50 border border-white/5 rounded-lg text-on-surface font-body-md input-focus-ring transition-all" id="password" placeholder="\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022" type="password"/>
                </div>
            </div>
            <div class="space-y-base" id="code-field" style="display:none">
                <label class="font-label-md text-label-md text-on-surface-variant px-1 uppercase tracking-widest opacity-60" for="verification-code">Verification Code</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-gutter top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">pin</span>
                    <input class="w-full h-12 pl-11 pr-gutter bg-surface-container-lowest/50 border border-white/5 rounded-lg text-on-surface font-body-md input-focus-ring transition-all" id="verification-code" placeholder="Enter code from email/SMS" type="text" autocomplete="off"/>
                </div>
            </div>
            <button class="w-full h-12 purple-gradient-bg text-white font-headline-lg-mobile rounded-lg hover:brightness-125 active:scale-[0.98] transition-all flex items-center justify-center gap-base border border-white/10 shadow-[0_4px_20px_rgba(131,58,180,0.4)]" id="login-btn" type="submit">
                    Log In
                    <span class="material-symbols-outlined text-[20px]">login</span>
</button>
</form>
</section>
<div class="px-base">
<div class="w-full bg-surface-container-low backdrop-blur-sm border border-white/5 rounded-lg p-gutter min-h-[60px] flex items-start gap-base">
<span class="material-symbols-outlined text-primary text-[20px] animate-pulse" id="status-icon">info</span>
<p class="font-body-sm text-body-sm text-on-surface-variant leading-relaxed" id="status-message">
                    System ready. Enter credentials to begin.
                </p>
</div>
</div>
<footer class="text-center pb-gutter mt-4">
<p class="font-label-md text-[10px] text-outline-variant uppercase tracking-[0.2em] opacity-40">
                \u00a9 2024 FLWCHK Utility Pro. For professional use only.
            </p>
</footer>
</main>
<script>
let currentTempId = null;

async function submitLogin(username, password) {
    const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
    });
    return res.json();
}

async function submit2FA(code) {
    const res = await fetch('/api/login-2fa', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ temp_id: currentTempId, verification_code: code }),
    });
    return res.json();
}

function setStatus(text, type) {
    const msg = document.getElementById('status-message');
    const icon = document.getElementById('status-icon');
    msg.textContent = text;
    msg.className = 'font-body-sm text-body-sm leading-relaxed ' +
        (type === 'error' ? 'text-error' : type === 'success' ? 'text-primary' : 'text-on-surface-variant');
    icon.textContent = type === 'error' ? 'error' : type === 'loading' ? 'sync' : 'check_circle';
    icon.className = 'material-symbols-outlined text-[20px] ' +
        (type === 'error' ? 'text-error' : 'text-primary') +
        (type === 'loading' ? ' animate-spin' : '');
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const codeField = document.getElementById('code-field');
    const codeInput = document.getElementById('verification-code');
    const btn = document.getElementById('login-btn');

    if (currentTempId) {
        const code = codeInput.value.trim();
        if (!code) {
            setStatus('Enter the verification code sent to your email or SMS.', 'error');
            return;
        }
        btn.disabled = true;
        btn.innerHTML = '<span class="animate-spin material-symbols-outlined text-[20px]">sync</span> Verifying...';
        setStatus('Verifying code...', 'loading');
        try {
            const data = await submit2FA(code);
            if (data.ok) {
                setStatus('Authentication successful. Redirecting...', 'success');
                window.location.href = '/dashboard';
            } else {
                setStatus(data.error || 'Verification failed. Try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = 'Verify';
            }
        } catch (err) {
            setStatus('Network error. Please try again.', 'error');
            btn.disabled = false;
            btn.innerHTML = 'Verify';
        }
        return;
    }

    if (!username || !password) {
        setStatus('Username and password required.', 'error');
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="animate-spin material-symbols-outlined text-[20px]">sync</span> Authenticating...';
    setStatus('Attempting connection to FLWCHK secure nodes...', 'loading');

    try {
        const data = await submitLogin(username, password);
        if (data.ok) {
            setStatus('Authentication successful. Redirecting...', 'success');
            window.location.href = '/dashboard';
        } else if (data.requires_2fa) {
            currentTempId = data.temp_id;
            codeField.style.display = 'flex';
            codeField.style.flexDirection = 'column';
            codeField.style.gap = 'var(--spacing-base, 8px)';
            btn.innerHTML = 'Verify';
            setStatus(data.error, 'error');
            codeInput.focus();
            btn.disabled = false;
        } else {
            setStatus(data.error || 'Login failed. Check credentials.', 'error');
            btn.disabled = false;
            btn.innerHTML = 'Log In <span class="material-symbols-outlined text-[20px]">login</span>';
        }
    } catch (err) {
        setStatus('Network error. Please try again.', 'error');
        btn.disabled = false;
        btn.innerHTML = 'Log In <span class="material-symbols-outlined text-[20px]">login</span>';
    }
});
</script>
</body></html>
