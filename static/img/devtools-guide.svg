<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#121414"/>
      <stop offset="100%" stop-color="#0a0c0c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e3b5ff"/>
      <stop offset="100%" stop-color="#833ab4"/>
    </linearGradient>
    <linearGradient id="tab-active" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2020"/>
      <stop offset="100%" stop-color="#1a1c1c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="540" rx="16" fill="url(#bg)"/>

  <!-- Browser Chrome -->
  <rect x="24" y="12" width="752" height="44" rx="10" fill="#222"/>
  <circle cx="44" cy="34" r="6" fill="#ff5f57"/>
  <circle cx="66" cy="34" r="6" fill="#ffbd2e"/>
  <circle cx="88" cy="34" r="6" fill="#28c840"/>
  <rect x="170" y="26" width="420" height="16" rx="8" fill="#1a1a1a"/>
  <text x="380" y="38" fill="#777" font-family="monospace" font-size="9" text-anchor="middle">www.instagram.com</text>

  <!-- Page area -->
  <rect x="24" y="56" width="460" height="470" rx="4" fill="#121414"/>

  <!-- Phone mockup -->
  <rect x="100" y="80" width="300" height="380" rx="28" fill="#161818" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="100" y="80" width="300" height="64" rx="28" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="230" y="100" width="40" height="6" rx="3" fill="#333"/>
  <circle cx="250" cy="128" r="14" fill="#2a2a2a"/>
  <circle cx="250" cy="128" r="8" fill="url(#accent)" opacity="0.4"/>
  <rect x="190" y="152" width="120" height="16" rx="4" fill="#2a2a2a"/>

  <!-- Feed mock content -->
  <g opacity="0.6">
    <rect x="130" y="190" width="240" height="8" rx="4" fill="#2a2a2a"/>
    <rect x="130" y="210" width="240" height="8" rx="4" fill="#2a2a2a"/>
    <rect x="130" y="230" width="240" height="8" rx="4" fill="#2a2a2a"/>
    <rect x="140" y="265" width="56" height="56" rx="12" fill="#2a2a2a"/>
    <rect x="210" y="270" width="130" height="10" rx="4" fill="#2a2a2a"/>
    <rect x="210" y="290" width="80" height="8" rx="4" fill="#333"/>
    <rect x="140" y="345" width="56" height="56" rx="12" fill="#2a2a2a"/>
    <rect x="210" y="350" width="130" height="10" rx="4" fill="#2a2a2a"/>
    <rect x="210" y="370" width="80" height="8" rx="4" fill="#333"/>
    <rect x="140" y="425" width="56" height="56" rx="12" fill="#2a2a2a"/>
    <rect x="210" y="430" width="130" height="10" rx="4" fill="#2a2a2a"/>
    <rect x="210" y="450" width="80" height="8" rx="4" fill="#333"/>
  </g>

  <!-- DevTools Panel -->
  <rect x="494" y="56" width="282" height="470" rx="4" fill="#1a1c1c" stroke="#2a2a2a" stroke-width="1"/>

  <!-- DevTools Tab Bar -->
  <rect x="494" y="56" width="282" height="36" rx="4" fill="#222"/>
  <rect x="516" y="56" width="96" height="36" fill="url(#tab-active)" rx="0"/>
  <text x="564" y="78" fill="#e3b5ff" font-family="monospace" font-size="11" text-anchor="middle" font-weight="bold">Application</text>
  <text x="628" y="78" fill="#777" font-family="monospace" font-size="11" text-anchor="middle">Network</text>
  <text x="690" y="78" fill="#777" font-family="monospace" font-size="11" text-anchor="middle">Sources</text>

  <!-- Sidebar -->
  <rect x="494" y="92" width="124" height="434" fill="#141616"/>
  <text x="508" y="116" fill="#888" font-family="monospace" font-size="10">▼ Storage</text>
  <text x="508" y="136" fill="#888" font-family="monospace" font-size="10">  ▼ Cookies</text>

  <!-- Highlighted instagram.com -->
  <rect x="508" y="146" width="100" height="22" rx="4" fill="#833ab4" opacity="0.15"/>
  <text x="520" y="161" fill="#e3b5ff" font-family="monospace" font-size="10" font-weight="bold">    instagram.com</text>

  <text x="520" y="182" fill="#555" font-family="monospace" font-size="10">  instagram.com</text>
  <text x="508" y="210" fill="#888" font-family="monospace" font-size="10">  Local Storage</text>
  <text x="508" y="230" fill="#888" font-family="monospace" font-size="10">  Session Storage</text>
  <text x="508" y="250" fill="#888" font-family="monospace" font-size="10">  IndexedDB</text>

  <!-- Cookies Table Header -->
  <rect x="618" y="92" width="158" height="28" fill="#1a1c1c"/>
  <text x="628" y="110" fill="#999" font-family="monospace" font-size="9">Name</text>
  <text x="690" y="110" fill="#999" font-family="monospace" font-size="9">Value</text>
  <line x1="618" y1="115" x2="776" y2="115" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Other cookie rows (dimmed) -->
  <text x="628" y="155" fill="#666" font-family="monospace" font-size="9">csrftoken</text>
  <text x="628" y="175" fill="#666" font-family="monospace" font-size="9">ds_user_id</text>
  <text x="628" y="195" fill="#666" font-family="monospace" font-size="9">rur</text>

  <!-- sessionid row - HIGHLIGHTED -->
  <rect x="618" y="125" width="158" height="22" fill="#833ab4" opacity="0.2"/>
  <rect x="618" y="125" width="3" height="22" fill="#e3b5ff"/>
  <text x="628" y="140" fill="#e3b5ff" font-family="monospace" font-size="9" font-weight="bold">sessionid</text>
  <text x="690" y="140" fill="#bbb" font-family="monospace" font-size="7">123456%3Aabc...</text>

  <!-- Pulsing indicator dot -->
  <circle cx="768" cy="136" r="4" fill="#ff5f57" filter="url(#glow)"/>

  <!-- Arrow pointing to sessionid row -->
  <path d="M 512 157 L 606 136" stroke="#ff5f57" stroke-width="2.5" stroke-dasharray="5,3" opacity="0.9"/>
  <polygon points="606,131 618,136 606,141" fill="#ff5f57"/>

  <!-- COPY badge -->
  <rect x="478" y="128" width="50" height="20" rx="6" fill="#ff5f57"/>
  <text x="503" y="142" fill="#fff" font-family="monospace" font-size="9" text-anchor="middle" font-weight="bold">COPY</text>

  <!-- Step indicators (integrated into the phone/page side) -->
  <!-- Step 1 -->
  <g transform="translate(28, 68)">
    <rect width="22" height="22" rx="11" fill="#833ab4" opacity="0.3"/>
    <text x="11" y="15" fill="#e3b5ff" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">1</text>
    <text x="32" y="15" fill="#ccc" font-family="monospace" font-size="10">Open Instagram in Chrome</text>
  </g>

  <!-- Step 2 -->
  <g transform="translate(28, 96)">
    <rect width="22" height="22" rx="11" fill="#833ab4" opacity="0.3"/>
    <text x="11" y="15" fill="#e3b5ff" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">2</text>
    <text x="32" y="15" fill="#ccc" font-family="monospace" font-size="10">Press F12 → Inspect</text>
  </g>

  <!-- Step 3 -->
  <g transform="translate(28, 124)">
    <rect width="22" height="22" rx="11" fill="#e3b5ff"/>
    <text x="11" y="15" fill="#4e0079" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">3</text>
    <text x="32" y="15" fill="#e3b5ff" font-family="monospace" font-size="10">Go to <tspan font-weight="bold">Application → Cookies</tspan></text>
  </g>

  <!-- Step 4 -->
  <g transform="translate(28, 152)">
    <rect width="22" height="22" rx="11" fill="#e3b5ff"/>
    <text x="11" y="15" fill="#4e0079" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">4</text>
    <text x="32" y="15" fill="#e3b5ff" font-family="monospace" font-size="10">Click <tspan font-weight="bold">sessionid</tspan> → copy Value</text>
  </g>

  <!-- Footer note -->
  <text x="400" y="530" fill="#555" font-family="monospace" font-size="9" text-anchor="middle">One-time setup — your session is saved and reused automatically.</text>
</svg>
