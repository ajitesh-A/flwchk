<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1c1c"/>
      <stop offset="100%" stop-color="#0c0f0f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e3b5ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#833ab4" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="12" fill="url(#bg)"/>

  <!-- Browser chrome -->
  <rect x="20" y="10" width="760" height="40" rx="8" fill="#2a2c2c"/>
  <circle cx="38" cy="30" r="6" fill="#ff5f56"/>
  <circle cx="58" cy="30" r="6" fill="#ffbd2e"/>
  <circle cx="78" cy="30" r="6" fill="#27c93f"/>
  <rect x="160" y="22" width="360" height="16" rx="8" fill="#1a1c1c"/>
  <text x="340" y="34" fill="#888" font-family="monospace" font-size="10" text-anchor="middle">www.instagram.com</text>

  <!-- Instagram page (simplified) -->
  <rect x="20" y="52" width="460" height="458" rx="4" fill="#121414"/>

  <!-- Phone mockup on page -->
  <rect x="100" y="80" width="300" height="360" rx="24" fill="#1a1c1c" stroke="#333" stroke-width="1"/>
  <rect x="100" y="80" width="300" height="60" rx="24" fill="none" stroke="#333" stroke-width="1"/>
  <rect x="220" y="100" width="60" height="8" rx="4" fill="#333"/>
  <circle cx="250" cy="130" r="16" fill="#333"/>
  <rect x="190" y="155" width="120" height="20" rx="4" fill="#333"/>
  <rect x="195" y="155" width="40" height="20" rx="4" fill="#e3b5ff" opacity="0.5"/>

  <!-- Scroll mock content -->
  <rect x="130" y="190" width="240" height="8" rx="4" fill="#2a2c2c"/>
  <rect x="130" y="210" width="240" height="8" rx="4" fill="#2a2c2c"/>
  <rect x="130" y="230" width="240" height="8" rx="4" fill="#2a2c2c"/>
  <rect x="140" y="260" width="60" height="60" rx="8" fill="#2a2c2c"/>
  <rect x="210" y="270" width="120" height="12" rx="4" fill="#2a2c2c"/>
  <rect x="210" y="290" width="80" height="8" rx="4" fill="#333"/>
  <rect x="140" y="340" width="60" height="60" rx="8" fill="#2a2c2c"/>
  <rect x="210" y="350" width="120" height="12" rx="4" fill="#2a2c2c"/>
  <rect x="210" y="370" width="80" height="8" rx="4" fill="#333"/>

  <!-- DevTools panel -->
  <rect x="490" y="52" width="290" height="458" rx="4" fill="#1e2020" stroke="#333" stroke-width="1"/>

  <!-- DevTools tabs -->
  <rect x="490" y="52" width="290" height="32" rx="4" fill="#2a2c2c"/>
  <rect x="510" y="52" width="90" height="32" fill="#1e2020"/>
  <text x="555" y="72" fill="#e3b5ff" font-family="monospace" font-size="11" text-anchor="middle" font-weight="bold">Application</text>
  <text x="615" y="72" fill="#888" font-family="monospace" font-size="11" text-anchor="middle">Network</text>
  <text x="675" y="72" fill="#888" font-family="monospace" font-size="11" text-anchor="middle">Storage</text>

  <!-- Sidebar -->
  <rect x="490" y="84" width="130" height="426" fill="#161818"/>
  <text x="505" y="108" fill="#888" font-family="monospace" font-size="10">▼ Storage</text>
  <text x="505" y="128" fill="#888" font-family="monospace" font-size="10">  ▼ Cookies</text>
  <text x="520" y="148" fill="#e3b5ff" font-family="monospace" font-size="10" font-weight="bold">  instagram.com</text>
  <text x="520" y="168" fill="#666" font-family="monospace" font-size="10">  instagram.com (1)</text>
  <text x="505" y="195" fill="#888" font-family="monospace" font-size="10">  Local Storage</text>
  <text x="505" y="215" fill="#888" font-family="monospace" font-size="10">  Session Storage</text>
  <text x="505" y="235" fill="#888" font-family="monospace" font-size="10">  IndexedDB</text>

  <!-- Cookies table -->
  <rect x="620" y="84" width="160" height="60" fill="#1e2020"/>
  <text x="630" y="104" fill="#888" font-family="monospace" font-size="9">Name</text>
  <text x="700" y="104" fill="#888" font-family="monospace" font-size="9">Value</text>
  <line x1="620" y1="110" x2="780" y2="110" stroke="#333" stroke-width="1"/>

  <!-- sessionid row -->
  <rect x="620" y="110" width="160" height="20" fill="#833ab4" opacity="0.2"/>
  <text x="630" y="124" fill="#e3b5ff" font-family="monospace" font-size="9" font-weight="bold">sessionid</text>
  <text x="700" y="124" fill="#aaa" font-family="monospace" font-size="7">123456%3Aabc...</text>

  <!-- Other cookie rows -->
  <text x="630" y="144" fill="#888" font-family="monospace" font-size="9">csrftoken</text>
  <text x="630" y="160" fill="#888" font-family="monospace" font-size="9">ds_user_id</text>

  <!-- Arrow pointing to sessionid -->
  <path d="M 530 120 L 610 120" stroke="#ff5f56" stroke-width="2" stroke-dasharray="4,2"/>
  <polygon points="610,115 620,120 610,125" fill="#ff5f56"/>

  <!-- Highlight circle around sessionid -->
  <circle cx="720" cy="120" r="18" fill="none" stroke="#ff5f56" stroke-width="2" opacity="0.6"/>

  <!-- Label near arrow -->
  <rect x="480" y="95" width="55" height="20" rx="4" fill="#ff5f56"/>
  <text x="507" y="109" fill="#fff" font-family="monospace" font-size="9" text-anchor="middle" font-weight="bold">COPY</text>

  <!-- Step badges -->
  <rect x="28" y="60" width="24" height="24" rx="12" fill="#833ab4"/>
  <text x="40" y="76" fill="#fff" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">1</text>
  <text x="60" y="76" fill="#e3b5ff" font-family="monospace" font-size="11">Open Instagram in Chrome</text>

  <rect x="28" y="86" width="24" height="24" rx="12" fill="#833ab4"/>
  <text x="40" y="102" fill="#fff" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">2</text>
  <text x="60" y="102" fill="#e3b5ff" font-family="monospace" font-size="11">Press F12 (or right-click → Inspect)</text>

  <rect x="28" y="112" width="24" height="24" rx="12" fill="#e3b5ff"/>
  <text x="40" y="128" fill="#4e0079" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">3</text>
  <text x="60" y="128" fill="#e3b5ff" font-family="monospace" font-size="11">Go to <tspan font-weight="bold">Application → Cookies → instagram.com</tspan></text>

  <rect x="28" y="138" width="24" height="24" rx="12" fill="#e3b5ff"/>
  <text x="40" y="154" fill="#4e0079" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">4</text>
  <text x="60" y="154" fill="#e3b5ff" font-family="monospace" font-size="11">Click <tspan font-weight="bold">sessionid</tspan> → copy the <tspan font-weight="bold">Value</tspan> column</text>

  <!-- Footer note -->
  <text x="250" y="510" fill="#666" font-family="monospace" font-size="9" text-anchor="middle">Only needs to be done once per user — the session is saved and reused automatically.</text>
</svg>
